services:
  postgres:
    image: postgres:16-alpine
    profiles:
      - backend
    environment:
      POSTGRES_DB: air_temple
      POSTGRES_USER: air_temple
      POSTGRES_PASSWORD: air_temple
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/internal/database/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    profiles:
      - backend
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: airtemple
      MINIO_ROOT_PASSWORD: airtemple-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    profiles:
      - backend
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 airtemple airtemple-secret;
      mc mb --ignore-existing local/air-temple-media;
      exit 0;
      "

  backend:
    build:
      context: ./backend
    profiles:
      - backend
    env_file:
      - ./backend/.env.example
    depends_on:
      - postgres
      - minio
      - minio-init
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_MODE: mock
      NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  minio_data:
